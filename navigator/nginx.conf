server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    # Serve static files; fall back to index.html for any path
    # (hash-based routing means the browser handles all # routes,
    #  so nginx only ever needs to serve index.html or real files)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Ensure JSON files are served with the correct content type
    location ~* \.json$ {
        add_header Content-Type application/json;
        try_files $uri =404;
    }

    # Do not cache JS/CSS — ensures users always get the latest after a Docker rebuild
    location ~* \.(css|js)$ {
        expires -1;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }

    # Disable caching for HTML and JSON (so content updates are picked up)
    location ~* \.(html)$ {
        expires -1;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";

    # Suppress nginx version in error pages
    server_tokens off;

    # Logging (visible in Docker Desktop's container logs)
    access_log /var/log/nginx/access.log;
    error_log  /var/log/nginx/error.log warn;
}
